<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Letter Catch Battle: Ww vs Xx!</title>
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Fredoka+One&display=swap" rel="stylesheet">
    <style>
        :root {
            --p1-color: #ff3838;
            --p2-color: #17c0eb;
        }

        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            font-family: 'Fredoka One', cursive;
        }

        /* --- GAME ENGINE LAYOUT & FIXED BACKGROUND USER FILE --- */
        .game-container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            position: relative;
            background: url('bg.png') no-repeat center center;
            background-size: cover;
            border: 10px solid #2f3640;
        }

        /* --- TOP HEADER SCORE-ZONE BAR --- */
        header {
            height: 14vh;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 30px;
            background: rgba(47, 54, 64, 0.9);
            border-bottom: 5px solid #fbc531;
            z-index: 10;
        }

        /* Container for tracking caught fruit files horizontally */
        .score-row-display {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #2f3640;
            padding: 10px 20px;
            border-radius: 20px;
            min-width: 28vw;
            height: 10vh;
            overflow-x: auto;
            white-space: nowrap;
            box-shadow: inset 0 4px 10px rgba(0,0,0,0.5);
            border: 4px solid white;
        }
        .score-row-display.p1 { border-color: var(--p1-color); }
        .score-row-display.p2 { border-color: var(--p2-color); }

        /* Custom Fruit Point Assets */
        .score-fruit-token {
            width: 45px;
            height: 45px;
            object-fit: contain;
            filter: drop-shadow(2px 3px 0px #000);
            animation: scorePop 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            flex-shrink: 0;
        }

        @keyframes scorePop {
            0% { transform: scale(0) rotate(-30deg); }
            100% { transform: scale(1) rotate(0); }
        }

        .timer-center {
            text-align: center;
            background: #fbc531;
            color: #2f3640;
            padding: 5px 35px;
            border-radius: 20px;
            border: 4px solid white;
            box-shadow: 0 6px 0 #e1b12c;
        }
        #timer-display {
            font-family: 'Luckiest Guy', cursive;
            font-size: 3rem;
            margin: 0;
            line-height: 1;
        }

        /* --- SPLIT ARENA LANES WITH CLEAR SEPARATOR LINE --- */
        .arena {
            display: flex;
            height: 86vh;
            width: 100%;
            position: relative;
        }

        .player-side {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            position: relative;
            padding: 20px;
        }

        #p1-side { 
            border-right: 6px solid #2f3640; 
            background: rgba(255, 56, 56, 0.03); 
        }
        #p2-side { 
            background: rgba(23, 192, 235, 0.03); 
        }

        .track {
            position: absolute;
            top: 0;
            bottom: 24vh;
            width: 100%;
            pointer-events: none;
        }

        /* --- THE MASSIVE CRISP GAME LETTERS --- */
        .falling-fruit {
            position: absolute;
            width: 150px;
            height: 150px;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 5;
        }

        .falling-fruit .letter { 
            font-family: 'Luckiest Guy', cursive; 
            font-size: 8rem; 
            color: #fff;
            text-shadow: 
                5px 5px 0px #000, -5px -5px 0px #000, 
                5px -5px 0px #000, -5px 5px 0px #000,
                0px 5px 0px #000, 0px -5px 0px #000,
                5px 0px 0px #000, -5px 0px 0px #000;
        }

        .falling-fruit.w-item .letter { color: #ff4757; }
        .falling-fruit.x-item .letter { color: #ffffff; }
        .falling-fruit.distractor-item .letter { color: #ffa502; }

        .falling-fruit .item-img {
            width: 90%;
            height: 90%;
            object-fit: contain;
            filter: drop-shadow(4px 5px 0px #000);
        }

        /* --- BASKET ZONE PLACEMENT --- */
        .button-zone {
            display: flex;
            gap: 40px;
            width: 90%;
            height: 22vh;
            z-index: 10;
            padding-bottom: 15px;
        }

        .basket-btn {
            flex: 1;
            background-position: center bottom;
            background-repeat: no-repeat;
            background-size: contain;
            cursor: pointer;
            transition: transform 0.05s;
            filter: drop-shadow(0 6px 4px rgba(0,0,0,0.3));
            position: relative;
        }

        .basket-btn.w-basket { background-image: url('basket_w.png'); }
        .basket-btn.x-basket { background-image: url('basket_x.png'); }

        .basket-btn:active, .basket-btn.pressed {
            transform: scale(0.93) translateY(4px);
            filter: drop-shadow(0 2px 2px rgba(0,0,0,0.4));
        }

        /* --- GRAPHICAL FLOATER TEXT --- */
        .combo-pop {
            position: absolute;
            font-family: 'Luckiest Guy', cursive;
            font-size: 3rem;
            color: #fff;
            text-shadow: 4px 4px 0 #000, -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000;
            animation: floatUp 0.6s ease-out forwards;
            pointer-events: none;
            z-index: 50;
        }

        .shake { animation: shakeAnim 0.3s ease-in-out; }
        @keyframes shakeAnim {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-8px); }
            40%, 80% { transform: translateX(8px); }
        }

        /* --- AUDIO TOGGLE --- */
        #audio-toggle {
            position: absolute;
            top: 16vh;
            right: 20px;
            width: 55px;
            height: 55px;
            background: #fff;
            border: 4px solid #2f3640;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.6rem;
            cursor: pointer;
            z-index: 100;
            box-shadow: 0 4px 0 #000;
        }

        /* --- SCREENS & OVERLAYS --- */
        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(47, 54, 64, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        #countdown-text {
            position: fixed;
            font-family: 'Luckiest Guy', cursive;
            font-size: 8rem;
            color: #fbc531;
            text-shadow: 6px 6px 0px #000;
            transform: scale(0.5);
            z-index: 2500;
        }

        .start-btn {
            font-family: 'Luckiest Guy', cursive;
            font-size: 3.5rem;
            padding: 15px 50px;
            background: #4cd137;
            color: white;
            border: 6px solid white;
            border-radius: 40px;
            cursor: pointer;
            box-shadow: 0 10px 0 #000;
        }
        .start-btn:active { transform: translateY(6px); box-shadow: 0 4px 0 #000; }

        .speed-mode-active { animation: panicFlash 0.5s infinite alternate; }
        @keyframes panicFlash {
            0% { background-color: rgba(75, 101, 132, 0.1); }
            100% { background-color: rgba(179, 57, 57, 0.3); }
        }
        
        .speed-warning {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-4deg);
            background: #ea2027;
            color: white;
            padding: 15px 40px;
            font-family: 'Luckiest Guy', cursive;
            font-size: 3.2rem;
            border: 6px solid white;
            border-radius: 20px;
            box-shadow: 0 10px 0 #000;
            z-index: 100;
            display: none;
            animation: pulse 0.5s infinite alternate;
        }

        @keyframes popIn { 0% { transform: scale(0.3); opacity: 0; } 100% { transform: scale(1.3); opacity: 1; } }
        @keyframes floatUp { 0% { transform: translateY(0) scale(0.8); opacity: 1; } 100% { transform: translateY(-90px) scale(1.2); opacity: 0; } }
        @keyframes pulse { 0% { transform: translate(-50%, -50%) rotate(-4deg) scale(1); } 100% { transform: translate(-50%, -50%) rotate(-4deg) scale(1.1); } }

        .firework { position: absolute; width: 8px; height: 8px; border-radius: 50%; pointer-events: none; z-index: 999; }

        @media (orientation: portrait) { #portrait-warning { display: flex !important; } }
        #portrait-warning {
            display: none; position: fixed; top:0; left:0; width:100%; height:100%;
            background:#2f3640; color:white; z-index:9999; justify-content:center;
            align-items:center; text-align:center; font-size:2rem; padding:20px;
        }
    </style>
</head>
<body>

<div id="portrait-warning">🔄 Please rotate your device to Landscape Mode to play!</div>

<div class="game-container" id="main-wall">
    <header>
        <div class="score-row-display p1" id="p1-asset-score"></div>
        
        <div class="timer-center" id="timer-box">
            <h2 id="timer-display">20</h2>
        </div>
        
        <div class="score-row-display p2" id="p2-asset-score"></div>
    </header>

    <div id="audio-toggle">🔊</div>
    <div class="speed-warning" id="speed-alert">SPEED UP MODE! ⚡🏆</div>

    <div class="arena">
        <div class="player-side" id="p1-side">
            <div class="track" id="p1-track"></div>
            <div class="button-zone">
                <div class="basket-btn w-basket" id="p1-w-btn"></div>
                <div class="basket-btn x-basket" id="p1-x-btn"></div>
            </div>
        </div>

        <div class="player-side" id="p2-side">
            <div class="track" id="p2-track"></div>
            <div class="button-zone">
                <div class="basket-btn w-basket" id="p2-w-btn"></div>
                <div class="basket-btn x-basket" id="p2-x-btn"></div>
            </div>
        </div>
    </div>
</div>

<div class="overlay" id="start-screen">
    <h1 style="color:white; font-size: 4.5rem; font-family:'Luckiest Guy'; text-align:center; margin-bottom:40px; text-shadow:4px 4px 0px #000;">LETTER CATCH MATCH<br><span style="color:#fbc531">Ww VS Xx!</span></h1>
    <button class="start-btn" onclick="triggerIntro()">START MATCH</button>
</div>

<div class="overlay" id="win-screen" style="display: none;">
    <h1 id="win-message" style="font-size:6rem; font-family:'Luckiest Guy'; text-shadow:5px 5px 0px #000; text-align:center; margin:0;">TIE MATCH!</h1>
    <div style="display:none;">
        <span id="final-p1">0</span>
        <span id="final-p2">0</span>
    </div>
    <button class="start-btn" style="background:#fbc531; box-shadow:0 10px 0 #000; color:#2f3640; margin-top: 30px;" onclick="location.reload()">PLAY AGAIN 🔄</button>
</div>

<script>
    const TARGET_ITEMS = [
        { type: 'letter', value: 'W', target: 'W', styleClass: 'w-item' },
        { type: 'letter', value: 'w', target: 'W', styleClass: 'w-item' },
        { type: 'image', value: 'watch.png', target: 'W', styleClass: 'w-item' },
        { type: 'letter', value: 'X', target: 'X', styleClass: 'x-item' },
        { type: 'letter', value: 'x', target: 'X', styleClass: 'x-item' },
        { type: 'image', value: 'six.png', target: 'X', styleClass: 'x-item' }
    ];

    const DISTRACTOR_ITEMS = [
        { type: 'letter', value: 'T', target: 'NONE', styleClass: 'distractor-item' },
        { type: 'letter', value: 't', target: 'NONE', styleClass: 'distractor-item' },
        { type: 'letter', value: 'U', target: 'NONE', styleClass: 'distractor-item' },
        { type: 'letter', value: 'u', target: 'NONE', styleClass: 'distractor-item' },
        { type: 'letter', value: 'V', target: 'NONE', styleClass: 'distractor-item' },
        { type: 'image', value: 'toy.png', target: 'NONE', styleClass: 'distractor-item' }
    ];

    const COMBOS = ["BOOM!", "PERFECT!", "NICE!", "AWESOME!", "GREAT!"];

    const FRUIT_SCORE_ASSETS = [
        'apple.png',
        'mango.png',
        'orange.png',
        'pineapple.png',
        'watermelon.png'
    ];

    let state = {
        playing: false,
        timer: 20,
        speedMode: false,
        audio: true,
        p1: { score: 0, activeFruits: [], queue: [] },
        p2: { score: 0, activeFruits: [], queue: [] },
        baseSpeed: 2.2,         
        spawnIntervalMs: 2800   
    };

    let gameInterval = null;
    let clockInterval = null;
    let spawnTimer = null;
    let uniqueFruitIdCounter = 0;

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    let musicInterval = null;

    function playSynthSound(type) {
        if (!state.audio) return;
        try {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            if (type === 'success') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(587.33, audioCtx.currentTime); 
                osc.frequency.setValueAtTime(880.00, audioCtx.currentTime + 0.08); 
                gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.25);
                osc.start(); osc.stop(audioCtx.currentTime + 0.25);
            } else if (type === 'incorrect') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(180, audioCtx.currentTime);
                osc.frequency.linearRampToValueAtTime(90, audioCtx.currentTime + 0.2);
                gain.gain.setValueAtTime(0.25, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.22);
                osc.start(); osc.stop(audioCtx.currentTime + 0.22);
            } else if (type === 'tick') {
                osc.type = 'square';
                osc.frequency.setValueAtTime(500, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.12, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                osc.start(); osc.stop(audioCtx.currentTime + 0.1);
            } else if (type === 'go') {
                osc.type = 'square';
                osc.frequency.setValueAtTime(1000, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                osc.start(); osc.stop(audioCtx.currentTime + 0.3);
            } else if (type === 'victory') {
                // TRIUMPHANT "YEHEY!" CASCADE SOUND EFFECT
                osc.type = 'triangle';
                const now = audioCtx.currentTime;
                gain.gain.setValueAtTime(0.25, now);
                
                osc.frequency.setValueAtTime(523.25, now);       // Note C5
                osc.frequency.setValueAtTime(659.25, now + 0.1); // Note E5
                osc.frequency.setValueAtTime(783.99, now + 0.2); // Note G5
                osc.frequency.setValueAtTime(1046.50, now + 0.3);// Note C6 (High Triumphant Hit!)
                
                gain.gain.setValueAtTime(0.25, now + 0.3);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 0.7);
                osc.start(); osc.stop(now + 0.7);
            } else if (type === 'tie') {
                // FRIENDLY HARMONIC CHORD SOUND FOR TIES
                osc.type = 'sine';
                const now = audioCtx.currentTime;
                gain.gain.setValueAtTime(0.2, now);
                osc.frequency.setValueAtTime(523.25, now); // Note C5
                gain.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
                osc.start(); osc.stop(now + 0.5);

                const osc2 = audioCtx.createOscillator();
                const gain2 = audioCtx.createGain();
                osc2.type = 'sine';
                osc2.connect(gain2);
                gain2.connect(audioCtx.destination);
                gain2.gain.setValueAtTime(0.2, now);
                osc2.frequency.setValueAtTime(783.99, now); // Note G5
                gain2.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
                osc2.start(); osc2.stop(now + 0.5);
            }
        } catch(e){}
    }

    function startBackgroundMusic() {
        if(!state.audio) return;
        try {
            let stepSpeed = state.speedMode ? 140 : 200; 
            let notes = [293.66, 349.23, 440.00, 392.00, 349.23, 392.00, 440.00, 293.66];
            let step = 0;

            musicInterval = setInterval(() => {
                if(!state.playing) return;
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(notes[step % notes.length], audioCtx.currentTime);
                gain.gain.setValueAtTime(0.04, audioCtx.currentTime); 
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + (stepSpeed / 1000));
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start(); osc.stop(audioCtx.currentTime + (stepSpeed / 1000));
                step++;
            }, stepSpeed);
        } catch(e){}
    }

    document.getElementById('audio-toggle').addEventListener('pointerdown', (e) => {
        state.audio = !state.audio;
        e.target.innerText = state.audio ? '🔊' : '🔇';
        if (!state.audio && musicInterval) clearInterval(musicInterval);
        else if (state.playing) { clearInterval(musicInterval); startBackgroundMusic(); }
    });

    function build100PercentEqualQueues() {
        let targetsPool = shuffleArray([...TARGET_ITEMS]).slice(0, 4);
        let distractorsPool = shuffleArray([...DISTRACTOR_ITEMS]).slice(0, 1);
        let combinedPool = [...targetsPool, ...distractorsPool];

        state.p1.queue = shuffleArray([...combinedPool]);
        state.p2.queue = shuffleArray([...combinedPool]);
    }

    function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    function triggerIntro() {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        document.getElementById('start-screen').style.display = 'none';
        
        build100PercentEqualQueues();

        let introCount = 3;
        const box = document.createElement('div');
        box.id = 'countdown-text';
        document.body.appendChild(box);

        const runCount = () => {
            if(introCount > 0) {
                box.innerText = introCount;
                playSynthSound('tick');
                box.style.animation = 'none';
                box.offsetHeight;
                box.style.animation = 'popIn 0.4s ease-out forwards';
                introCount--;
                setTimeout(runCount, 1000);
            } else {
                box.innerText = "GO!";
                playSynthSound('go');
                box.style.animation = 'popIn 0.4s ease-out forwards';
                setTimeout(() => {
                    box.remove();
                    beginTheMatch();
                }, 800);
            }
        };
        runCount();
    }

    function beginTheMatch() {
        state.playing = true;
        startBackgroundMusic();

        executeSynchronizedSpawnTick();

        spawnTimer = setInterval(() => {
            if(state.playing && !state.speedMode) {
                executeSynchronizedSpawnTick();
            }
        }, state.spawnIntervalMs);

        gameInterval = setInterval(() => {
            if(state.playing) {
                updateFallingPositions(1);
                updateFallingPositions(2);
            }
        }, 1000 / 60);

        clockInterval = setInterval(() => {
            if(!state.playing) return;
            state.timer--;
            document.getElementById('timer-display').innerText = state.timer;

            if(state.timer === 3 && !state.speedMode) {
                state.speedMode = true;
                clearInterval(spawnTimer);

                state.p1.queue = [];
                state.p2.queue = [];

                document.getElementById('main-wall').classList.add('speed-mode-active');
                document.getElementById('speed-alert').style.display = 'block';
                document.getElementById('timer-box').style.backgroundColor = '#ea2027';
                document.getElementById('timer-box').style.color = '#fff';
                
                state.baseSpeed = 4.6; 
                
                spawnTimer = setInterval(() => {
                    if(state.playing) executeSynchronizedSpawnTick();
                }, 450);
                
                if(musicInterval) clearInterval(musicInterval);
                startBackgroundMusic();
            }

            if(state.timer <= 0) {
                concludeMatch();
            }
        }, 1000);
    }

    function executeSynchronizedSpawnTick() {
        uniqueFruitIdCounter++;
        spawnItemNode(1, uniqueFruitIdCounter);
        spawnItemNode(2, uniqueFruitIdCounter);
    }

    function spawnItemNode(player, uniqueId) {
        const pState = state[`p${player}`];
        let sourceItem;

        if (pState.queue.length > 0) {
            sourceItem = pState.queue.pop();
        } else {
            if (Math.random() < 0.65) {
                sourceItem = TARGET_ITEMS[Math.floor(Math.random() * TARGET_ITEMS.length)];
            } else {
                sourceItem = DISTRACTOR_ITEMS[Math.floor(Math.random() * DISTRACTOR_ITEMS.length)];
            }
        }

        const track = document.getElementById(`p${player}-track`);
        const node = document.createElement('div');
        node.className = `falling-fruit ${sourceItem.styleClass}`;
        node.id = `item-${player}-${uniqueId}`;
        
        if (sourceItem.type === 'letter') {
            node.innerHTML = `<div class="letter">${sourceItem.value}</div>`;
        } else {
            node.innerHTML = `<img src="${sourceItem.value}" class="item-img" alt="target">`;
        }

        let horizontalTrackPos = Math.floor(Math.random() * 40) + 30;
        node.style.left = `calc(${horizontalTrackPos}% - 75px)`;
        node.style.top = `-150px`;
        track.appendChild(node);

        pState.activeFruits.push({
            id: uniqueId,
            dom: node,
            y: -150,
            target: sourceItem.target,
            itemType: sourceItem.type,
            itemValue: sourceItem.value
        });
    }

    function updateFallingPositions(player) {
        const pState = state[`p${player}`];
        const trackMaxHeight = document.getElementById(`p${player}-track`).offsetHeight;

        for (let i = pState.activeFruits.length - 1; i >= 0; i--) {
            let item = pState.activeFruits[i];
            item.y += state.baseSpeed;
            item.dom.style.top = item.y + 'px';

            if (item.y > trackMaxHeight) {
                if (item.target !== 'NONE') {
                    triggerScoreSplash(player, false, "MISS!");
                    triggerScreenShake(player);
                    playSynthSound('incorrect');
                }
                item.dom.remove();
                pState.activeFruits.splice(i, 1);
            }
        }
    }

    function evaluatePlayerTap(player, basketChoice) {
        if(!state.playing) return;
        const pState = state[`p${player}`];
        if(pState.activeFruits.length === 0) return;

        let targetFruit = pState.activeFruits[0];

        if (targetFruit.target === 'NONE') {
            triggerScoreSplash(player, false, "BAD!");
            triggerScreenShake(player);
            playSynthSound('incorrect');
            
            targetFruit.dom.remove();
            pState.activeFruits.shift();
            return;
        }

        if (targetFruit.target === basketChoice) {
            let pointBonus = state.speedMode ? 2 : 1;
            
            const headerDisplay = document.getElementById(`p${player}-asset-score`);
            
            for(let k = 0; k < pointBonus; k++) {
                pState.score++;
                
                let fruitAssetIndex = (pState.score - 1) % FRUIT_SCORE_ASSETS.length;
                let targetFruitFilename = FRUIT_SCORE_ASSETS[fruitAssetIndex];

                const imgToken = document.createElement('img');
                imgToken.src = targetFruitFilename; 
                imgToken.className = 'score-fruit-token';
                headerDisplay.appendChild(imgToken);
            }
            
            headerDisplay.scrollLeft = headerDisplay.scrollWidth;

            let randomQuote = COMBOS[Math.floor(Math.random() * COMBOS.length)];
            triggerScoreSplash(player, true, randomQuote);
            playSynthSound('success');

        } else {
            triggerScoreSplash(player, false, "WRONG!");
            triggerScreenShake(player);
            playSynthSound('incorrect');
        }

        targetFruit.dom.remove();
        pState.activeFruits.shift();
    }

    function triggerScoreSplash(player, isPositive, text) {
        const side = document.getElementById(`p${player}-side`);
        const floater = document.createElement('div');
        floater.className = 'combo-pop';
        floater.innerText = text;
        floater.style.color = isPositive ? '#4cd137' : '#ea2027';
        floater.style.left = '40%';
        floater.style.top = '50%';
        side.appendChild(floater);
        setTimeout(() => floater.remove(), 600);
    }

    function triggerScreenShake(player) {
        const targetSide = document.getElementById(`p${player}-side`);
        targetSide.classList.add('shake');
        setTimeout(() => targetSide.classList.remove('shake'), 300);
    }

    function bindTouchControls(player, letterKey) {
        const btn = document.getElementById(`p${player}-${letterKey.toLowerCase()}-btn`);
        
        const tapEvent = (e) => {
            e.preventDefault();
            btn.classList.add('pressed');
            evaluatePlayerTap(player, letterKey);
        };
        const releaseEvent = () => btn.classList.remove('pressed');

        btn.addEventListener('pointerdown', tapEvent);
        btn.addEventListener('pointerup', releaseEvent);
        btn.addEventListener('pointerleave', releaseEvent);
    }

    bindTouchControls(1, 'W');
    bindTouchControls(1, 'X');
    bindTouchControls(2, 'W');
    bindTouchControls(2, 'X');

    function concludeMatch() {
        state.playing = false;
        clearInterval(gameInterval);
        clearInterval(clockInterval);
        clearInterval(spawnTimer);
        if(musicInterval) clearInterval(musicInterval);

        document.getElementById('final-p1').innerText = state.p1.score;
        document.getElementById('final-p2').innerText = state.p2.score;

        const msg = document.getElementById('win-message');
        if (state.p1.score > state.p2.score) {
            msg.innerText = "PLAYER 1 WINS! 🏆";
            msg.style.color = "var(--p1-color)";
            playSynthSound('victory'); // Trigger Victory sound profile
        } else if (state.p2.score > state.p1.score) {
            msg.innerText = "PLAYER 2 WINS! 🏆";
            msg.style.color = "var(--p2-color)";
            playSynthSound('victory'); // Trigger Victory sound profile
        } else {
            msg.innerText = "IT'S A TIE! 🤝";
            msg.style.color = "#fbc531";
            playSynthSound('tie'); // Trigger friendly tie sound profile
        }

        document.getElementById('win-screen').style.display = 'flex';
        triggerFireworksDisplay();
    }

    function triggerFireworksDisplay() {
        for (let i = 0; i < 60; i++) {
            setTimeout(() => {
                const f = document.createElement('div');
                f.className = 'firework';
                f.style.left = Math.random() * 100 + 'vw';
                f.style.top = Math.random() * 100 + 'vh';
                f.style.backgroundColor = `hsl(${Math.random() * 360}deg, 100%, 60%)`;
                f.style.boxShadow = `0 0 ${Math.random() * 20 + 10}px currentcolor`;
                document.body.appendChild(f);
                
                let destX = (Math.random() - 0.5) * 300;
                let destY = (Math.random() - 0.5) * 300;
                
                f.animate([
                    { transform: 'scale(1) translate(0,0)', opacity: 1 },
                    { transform: `scale(0) translate(${destX}px, ${destY}px)`, opacity: 0 }
                ], { duration: 1000, easing: 'ease-out', fill: 'forwards' });
                
                setTimeout(() => f.remove(), 1000);
            }, i * 40);
        }
    }
</script>
